# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7.0.0
    - name: Set up Go
      uses: actions/setup-go@v6.5.0
      with:
        go-version: '1.26'
    - name: Cache Go modules
      uses: actions/cache@v5.1.0
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    - name: Test
      run: go test -v ./...
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7.0.0
    - name: Set up Go
      uses: actions/setup-go@v6.5.0
      with:
        go-version: '1.26'
    - name: Cache Go modules
      uses: actions/cache@v5.1.0
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    - name: Build
      run: make build

