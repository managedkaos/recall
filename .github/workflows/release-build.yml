name: Build and Release Binaries

on:
  push:
    tags:
      - 'v*' # Triggers on any tag starting with v (e.g., v1.0.0)

jobs:
  release:
    runs-on: ubuntu-latest

    # Required to allow GitHub CLI to create releases and upload assets
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Binaries
        run: |
          make build-all

      - name: Create Release and Upload Binaries
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Creates a release using the tag name (e.g., v1.0.0) and uploads all files from bin/
          gh release create ${{ github.ref_name }} bin/* --title "Release ${{ github.ref_name }}" --generate-notes
