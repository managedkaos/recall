name: Build and Release Binary

on:
  push:
    tags:
      - 'v*' # Triggers on any tag starting with v (e.g., v1.0.0)
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v1.2.3)'
        required: true
        default: ''

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7.0.0

      - name: Set up Go
        uses: actions/setup-go@v6.5.0
        with:
          go-version: '1.26'

      - name: Cache Go modules
        uses: actions/cache@v5.1.0
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Build Binaries
        env:
          BUILD_ENV: GitHub Actions
          GIT_BRANCH: ${{ github.ref_name }}
          BUILD_DATE: ${{ github.event.head_commit.timestamp }}
        run: make build-all

      - name: Show build artifacts
        run: ls -la bin || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: bin
          path: bin

  test:
    name: Test built binaries
    needs: build
    uses: ./.github/workflows/test-binaries.yml
    with:
      artifact_name: bin
      binary_name: recall

  release:
    name: Create release
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7.0.0

      - name: Download build artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: bin
          path: bin

      - name: Create Release and Upload Binaries
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          if [ -z "${TAG:-}" ]; then
            echo "Tag is empty; aborting."
            exit 1
          fi
          echo "Creating release for $TAG and uploading bin/*"
          gh release create "$TAG" bin/* --title "Release $TAG" --generate-notes
