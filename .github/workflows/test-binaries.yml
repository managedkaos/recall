name: Test Binaries (reusable)

on:
  workflow_call:
    inputs:
      artifact_name:
        required: false
        type: string
        default: 'bin'
      binary_name:
        required: false
        type: string
        default: 'recall'

jobs:
  test:
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            ext: ''
          - os: linux
            arch: arm64
            runner: ubuntu-latest
            ext: ''
          - os: darwin
            arch: amd64
            runner: macos-latest
            ext: ''
          - os: darwin
            arch: arm64
            runner: macos-latest
            ext: ''
          - os: windows
            arch: amd64
            runner: windows-latest
            ext: '.exe'
    runs-on: ${{ matrix.runner }}
    env:
      FILE: ${{ format('{}-{}-{}{}', inputs.binary_name, matrix.os, matrix.arch, matrix.ext) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Download build artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: ${{ inputs.artifact_name }}
          path: artifacts

      - name: List downloaded files
        run: ls -la artifacts || true

      - name: Prepare binary (non-windows)
        if: matrix.os != 'windows'
        run: |
          chmod +x artifacts/${{ env.FILE }}

      - name: Run smoke test (non-windows)
        if: matrix.os != 'windows'
        run: |
          echo "Running binary artifacts/${{ env.FILE }}"
          ./artifacts/${{ env.FILE }} --version || true

      - name: Run smoke test (windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          Write-Host "Running binary .\\artifacts\\${{ env.FILE }}"
          & .\\artifacts\\${{ env.FILE }} --version || Write-Host 'binary ran or exited non-zero'

      - name: Upload test log
        uses: actions/upload-artifact@v7.0.1
        with:
          name: test-log-${{ matrix.os }}-${{ matrix.arch }}
          path: artifacts
